name: local_global_surface_model

num_atom_types: 16
cutoff: 8.0
max_neighbors: 64

local_encoder:
  type: deepsets
  atom_embed_dim: 16
  rbf_dim: 16
  hidden_dim: 128
  out_dim: 128

global_encoder:
  type: mean_pool
  atom_embed_dim: 16
  hidden_dim: 128
  out_dim: 128

fusion:
  type: concat

decoder:
  hidden_dim: 128
  out_dim: 1

