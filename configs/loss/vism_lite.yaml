# Objective defaults for VISM-lite. Each loss entry is config-driven so ablations
# can change both the weight and the query groups it applies to without editing code.
losses:
  containment:
    # Explicit inside/outside supervision only on containment anchor queries.
    weight: 2.0
    groups: [containment]
  weak_prior:
    # Weak atomic-union prior regularizes both the near-surface region and
    # the sampled interior anchors to suppress spurious internal zero-crossings.
    weight: 0.5
    groups: [containment, surface_band]
  area:
    # Area regularization is evaluated on near-surface samples.
    weight: 1.0
    groups: [surface_band]
  pressure_volume:
    # Pressure-volume stays very small in the baseline for stability.
    weight: 0.5
    groups: [global]
  lj_body:
    # LJ body term is disabled in phase 1 and annealed in later.
    weight: 0.1
    groups: [global]
  volume:
    # Disable the old toy volume-fraction target in the baseline.
    weight: 0.0
    groups: [global]
  eikonal:
    # Eikonal uses the union of global + surface-band samples by default.
    weight: 0.5
    groups: [global, surface_band]

pressure: 0.01
rho_0: 0.0334
target_volume_fraction: 0.5
heaviside_eps: 0.1
delta_eps: 0.1
containment_margin: 0.5
anneal:
  warmup_epochs: 200
  initial_weights:
    containment: 2.0
    weak_prior: 1.0
    area: 0.0
    pressure_volume: 0.0
    lj_body: 0.0
    volume: 0.0
    eikonal: 0.5
  final_weights:
    containment: 2.0
    weak_prior: 0.0
    area: 1.0
    pressure_volume: 0.5
    lj_body: 0.1
    volume: 0.0
    eikonal: 0.5
